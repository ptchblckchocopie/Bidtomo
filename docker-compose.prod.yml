services:
  # Caddy reverse proxy — automatic HTTPS via Let's Encrypt
  # Routes to both production and staging by hostname
  caddy:
    image: caddy:2-alpine
    container_name: prod-caddy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-staging.localhost}
    depends_on:
      cms:
        condition: service_started
      sse-service:
        condition: service_started
    networks:
      - bidtomo-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL — internal only, no exposed port
  postgres:
    image: postgres:15-alpine
    container_name: prod-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-internal

  # PgBouncer — connection pooler for PostgreSQL
  # Multiplexes many app connections into a small pool of real DB connections
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    container_name: prod-pgbouncer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marketplace}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 40
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-internal

  # Redis — internal only, no exposed port, password-protected
  redis:
    image: redis:7-alpine
    container_name: prod-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-internal

  # Redis replica — read-only copy for failover
  redis-replica:
    image: redis:7-alpine
    container_name: prod-redis-replica
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    command: redis-server --replicaof redis 6379 --masterauth ${REDIS_PASSWORD} --requirepass ${REDIS_PASSWORD} --appendonly yes
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - prod-internal

  # Redis Sentinel — monitors master and handles automatic failover
  redis-sentinel:
    image: redis:7-alpine
    container_name: prod-redis-sentinel
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    entrypoint: >
      sh -c '
        echo "sentinel monitor mymaster redis 6379 1" > /tmp/sentinel.conf &&
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf &&
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf &&
        echo "sentinel auth-pass mymaster ${REDIS_PASSWORD}" >> /tmp/sentinel.conf &&
        echo "sentinel resolve-hostnames yes" >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      '
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - prod-internal

  # PayloadCMS Backend (PM2 cluster mode — uses all available CPUs)
  cms:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1536M
    build:
      context: ./cms
      dockerfile: Dockerfile
      args:
        SERVER_URL: ${SERVER_URL:-http://localhost:3001}
        DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-marketplace}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required}
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-cms
    restart: unless-stopped
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-marketplace}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-marketplace}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PORT: 3001
      SERVER_URL: ${SERVER_URL}
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-sgp1}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://sgp1.digitaloceanspaces.com}
      S3_BUCKET: ${S3_BUCKET:-veent}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      DB_PUSH: ${DB_PUSH:-false}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bidtomo-shared
      - prod-internal

  # SSE Service for real-time updates
  sse-service:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    build:
      context: ./services/sse-service
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-sse
    restart: unless-stopped
    environment:
      PORT: 3002
      SSE_PORT: 3002
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      SSE_CORS_ORIGIN: ${FRONTEND_URL}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - bidtomo-shared
      - prod-internal

  # Bid Worker — no port, processes Redis queue
  bid-worker:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    build:
      context: ./services/bid-worker
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-bid-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-marketplace}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-internal

  # Prometheus — metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prod-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
    networks:
      - prod-internal

  # Grafana — metrics dashboards & alerting
  grafana:
    image: grafana/grafana:10.4.0
    container_name: prod-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3003}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - prod-internal

networks:
  bidtomo-shared:
    external: true
  prod-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
