services:
  # Caddy reverse proxy — automatic HTTPS via Let's Encrypt
  # Routes to both production and staging by hostname
  caddy:
    image: caddy:2-alpine
    container_name: prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-staging.localhost}
    depends_on:
      cms:
        condition: service_started
      sse-service:
        condition: service_started
    networks:
      - bidtomo-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL — internal only, no exposed port
  postgres:
    image: postgres:15-alpine
    container_name: prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-internal

  # Redis — internal only, no exposed port, password-protected
  redis:
    image: redis:7-alpine
    container_name: prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-internal

  # PayloadCMS Backend
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
      args:
        SERVER_URL: ${SERVER_URL:-http://localhost:3001}
        DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marketplace}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required}
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-cms
    restart: unless-stopped
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marketplace}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marketplace}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PORT: 3001
      SERVER_URL: ${SERVER_URL}
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-sgp1}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://sgp1.digitaloceanspaces.com}
      S3_BUCKET: ${S3_BUCKET:-veent}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      DB_PUSH: ${DB_PUSH:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bidtomo-shared
      - prod-internal

  # SSE Service for real-time updates
  sse-service:
    build:
      context: ./services/sse-service
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-sse
    restart: unless-stopped
    environment:
      PORT: 3002
      SSE_PORT: 3002
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      SSE_CORS_ORIGIN: ${FRONTEND_URL}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - bidtomo-shared
      - prod-internal

  # Bid Worker — no port, processes Redis queue
  bid-worker:
    build:
      context: ./services/bid-worker
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: prod-bid-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marketplace}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-internal

networks:
  bidtomo-shared:
    external: true
  prod-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
