<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="BidMo.to — The Filipino auction marketplace. Bid, buy, and sell unique items in real-time.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0A0A0A">
    <meta property="og:title" content="BidMo.to — Filipino Auction Marketplace">
    <meta property="og:description" content="Bid, buy, and sell unique items in real-time. Electronics, collectibles, and more from Filipino sellers.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="BidMo.to">
    <meta property="og:url" content="https://www.bidmo.to">
    <meta property="og:locale" content="en_PH">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="BidMo.to — Filipino Auction Marketplace">
    <meta name="twitter:description" content="Bid, buy, and sell unique items in real-time.">
    <link rel="canonical" href="https://www.bidmo.to">
    <link rel="icon" href="%sveltekit.assets%/hammer.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
    <title>BidMo.to — Filipino Auction Marketplace</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BidMo.to",
      "url": "https://www.bidmo.to",
      "description": "The Filipino auction marketplace. Bid, buy, and sell unique items in real-time.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.bidmo.to/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
