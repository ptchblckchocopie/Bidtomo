name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  type-check:
    name: Type-check before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Type-check CMS
        run: |
          cd cms
          npm ci
          npx tsc --noEmit

      - name: Type-check Frontend
        run: |
          cd frontend
          npm ci
          npm run check

  deploy-backend:
    name: Deploy backend to production
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            docker network inspect bidtomo-shared >/dev/null 2>&1 || docker network create bidtomo-shared
            cd /opt/bidtomo
            git fetch origin
            git checkout main
            git pull origin main
            export GIT_SHA=$(git rev-parse --short HEAD)
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T cms npm run migrate
            echo "Production deployed! Release: $GIT_SHA"
