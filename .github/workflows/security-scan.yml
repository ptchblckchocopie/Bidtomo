name: Security Scan

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  trivy-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: cms, context: ./cms }
          - { name: sse-service, context: ./services/sse-service }
          - { name: bid-worker, context: ./services/bid-worker }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service.name }} image
        run: |
          docker build \
            --build-arg PAYLOAD_SECRET=ci-scan-dummy \
            --build-arg DATABASE_URL=postgresql://localhost:5432/dummy \
            --build-arg SERVER_URL=http://localhost:3001 \
            -t bidtomo-${{ matrix.service.name }}:scan \
            ${{ matrix.service.context }}

      - name: Scan ${{ matrix.service.name }} with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bidtomo-${{ matrix.service.name }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
